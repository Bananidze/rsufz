# Локальный стенд РСУФЗ.
# Поднимается из корня репозитория: `docker compose -f deployments/docker-compose.yml up -d`
# или через ./tasks.ps1 up

services:
  postgres:
    image: postgres:16-alpine
    container_name: rsufz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rsufz
      POSTGRES_PASSWORD: rsufz
      POSTGRES_DB: rsufz
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rsufz -d rsufz"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: rsufz-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  redis-data:
