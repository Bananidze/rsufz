global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: rsufz-apigateway
    static_configs:
      - targets: ["host.docker.internal:9090"]
        labels:
          component: apigateway

  - job_name: rsufz-scheduler
    static_configs:
      - targets: ["host.docker.internal:9091"]
        labels:
          component: scheduler

  - job_name: rsufz-worker
    static_configs:
      - targets: ["host.docker.internal:9092"]
        labels:
          component: worker
