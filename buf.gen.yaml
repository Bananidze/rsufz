version: v2

# Генерируем Go-код в gen/go/.
# Папка gen/ добавлена в .gitignore — генерируется локально и в CI.
#
# Установка плагинов (один раз):
#   go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
#   go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

inputs:
  - directory: api/proto

plugins:
  - local: protoc-gen-go
    out: gen/go
    opt:
      - paths=source_relative

  - local: protoc-gen-go-grpc
    out: gen/go
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false  # не ломать билд при расширении API
